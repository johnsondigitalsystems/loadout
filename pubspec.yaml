# =============================================================================
# FILE: pubspec.yaml
# =============================================================================
# This file is the **package manifest** for the LoadOut Flutter app. If you
# come from the JavaScript world, it's the rough equivalent of `package.json`.
# If you come from Rust, it plays the role of `Cargo.toml`. Every Dart and
# Flutter project has exactly one `pubspec.yaml` at its root, and the Dart
# pub tool (`flutter pub get`, `flutter pub upgrade`, `dart pub ...`) reads it
# to figure out:
#
#   - the package's identity (name, description, version),
#   - which Dart SDK / Flutter SDK versions it is allowed to compile against,
#   - the runtime dependencies it needs to download from pub.dev,
#   - the dev-only dependencies (testing, lints, code generation),
#   - which on-disk asset directories Flutter should bake into the app bundle,
#   - which fonts to register, and
#   - any platform-specific tooling configuration (icons, splash screens, etc.).
#
# The format is YAML â€” whitespace-significant; two-space indentation; no tabs.
# Every time you edit this file, run `flutter pub get` afterwards to resolve
# the new dependency graph and regenerate `pubspec.lock`. Do not edit
# `pubspec.lock` by hand; it's machine-generated.
#
# -----------------------------------------------------------------------------
# Top-level keys, in the order they appear below
# -----------------------------------------------------------------------------
#
# - `name`                 The package's import name (lowercase, snake_case).
#                          Other Dart files import this package as
#                          `package:<name>/...`, so changing it is a breaking
#                          change.
# - `description`          One-line human description. Required by pub.dev,
#                          irrelevant to private apps but kept for tooling.
# - `publish_to: 'none'`   Belt-and-suspenders prevention against accidentally
#                          running `flutter pub publish` and uploading the
#                          private codebase to pub.dev.
# - `version`              Semantic version + build number. Format is
#                          `MAJOR.MINOR.PATCH+BUILD`. The `+BUILD` part
#                          maps to iOS `CFBundleVersion` and Android
#                          `versionCode` â€” App Store / Play Store will
#                          reject a binary whose build number isn't strictly
#                          greater than the previous upload.
# - `environment`          SDK constraints. `sdk: ^3.11.5` means "Dart
#                          version 3.11.5 or later, but stay on the same
#                          major version (3.x.x)". The Flutter SDK is not
#                          listed here separately â€” its version is implied
#                          by which `flutter` CLI you have installed.
# - `dependencies`         Runtime dependencies: anything imported from
#                          `lib/`. Bundled into the production app.
# - `dev_dependencies`     Build- and test-only dependencies. Stripped from
#                          release builds. Linters, code generators, and the
#                          test harness live here.
# - `flutter:`             Flutter-specific configuration. Lists asset
#                          directories (`assets:`), font families
#                          (`fonts:`), and platform options. Anything inside
#                          this block is read by the Flutter build pipeline,
#                          not by the Dart pub tool.
#
# Other top-level blocks (`flutter_launcher_icons:` further down) are
# read by individual packages â€” `flutter_launcher_icons` looks for its own
# top-level key when you run `dart run flutter_launcher_icons`.
#
# -----------------------------------------------------------------------------
# Why each runtime dependency below is here
# -----------------------------------------------------------------------------
#
# Storage and state:
# - `drift` / `drift_flutter` â€” typed SQLite ORM (Object-Relational Mapper).
#   `drift` provides the table-class API and the build-time code generator
#   that emits `database.g.dart`; `drift_flutter` provides the Flutter-aware
#   helpers that open the database file from the application support
#   directory. SQLite is the single source of truth for ALL user data â€”
#   loads, firearms, brass lots, batches, test sessions â€” see
#   `lib/database/database.dart`.
# - `sqlite3_flutter_libs` â€” bundles the prebuilt SQLite native library
#   inside the iOS / Android app so we don't depend on the OS-shipped one
#   (which can vary in version and feature flags).
# - `path` / `path_provider` â€” `path` is platform-agnostic path
#   manipulation; `path_provider` returns OS-specific directories
#   (application support, temp, documents). Used both by drift to find the
#   DB file and by the backup/export feature to write archives.
# - `shared_preferences` â€” OS key/value store for tiny app preferences
#   (UI detail level, AI quota counter, the email-link sign-in pending
#   address, etc.). Do not put anything large or sensitive here â€” use
#   SQLite for that.
# - `provider` â€” dependency injection / state management. The `AppDatabase`,
#   `AuthService`, `EntitlementNotifier`, and every repository are
#   provided via `MultiProvider` at the root in `lib/app.dart`, then
#   pulled out by descendants with `context.read<T>()` /
#   `context.watch<T>()`. This is what lets every screen share one SQLite
#   handle and one auth listener.
#
# Authentication (Firebase Auth is the ONLY Firebase service used at
# runtime; there is no Firestore, Storage, or Functions in this app):
# - `firebase_core` â€” bootstrap that initializes the Firebase iOS/Android
#   SDKs from `lib/firebase_options.dart`.
# - `firebase_auth` â€” the Firebase Authentication SDK. Backs all seven
#   sign-in providers wired up in `lib/services/auth_service.dart`.
# - `google_sign_in` â€” native Google sign-in flow (Apple equivalent
#   uses a separate package).
# - `sign_in_with_apple` â€” Apple's required native "Sign in with Apple"
#   sheet on iOS. Without this package, the iOS App Store will reject the
#   app under guideline 4.8 if any third-party login is offered.
# - `app_links` â€” registers the app as a handler for HTTPS deep links
#   (Universal Links on iOS, App Links on Android) so that Firebase email-link
#   sign-ins can return to the app after the user clicks the verification
#   link in their email.
#
# Monetization:
# - `purchases_flutter` â€” RevenueCat SDK. Wraps Apple StoreKit and Google
#   Play Billing behind a single cross-platform API and gives us the
#   "entitlement" abstraction we use to gate Pro features. See
#   `lib/services/purchases_service.dart` and
#   `lib/services/entitlement_notifier.dart`. Subscription SKUs and
#   entitlement IDs live in `REVENUECAT_SETUP.md`.
#
# Backup and export (feature #5):
# - `share_plus` â€” exposes the OS share sheet (AirDrop on iOS, ACTION_SEND
#   on Android, system share on macOS/Windows). Lets the user export their
#   local JSON backup to email, Files, AirDrop, etc.
# - `cryptography` â€” pure-Dart AES-256-GCM and PBKDF2. Used to encrypt
#   the cloud-backup blob ON-DEVICE before it is uploaded, so neither
#   iCloud nor Google Drive ever sees plaintext. Pure-Dart on purpose
#   so the same code path works on every platform without native deps.
# - `icloud_storage` â€” iOS-only iCloud Drive backup target. Falls back
#   to "unavailable" gracefully when the iCloud capability isn't enabled
#   on the App ID, so dev builds and CI don't break for the absence.
# - `googleapis` / `googleapis_auth` â€” Google's official client libs for
#   the Drive REST API. We write to the `appDataFolder` scope, which is
#   private to the LoadOut app â€” not visible in the user's main Drive UI.
#   Cross-platform; ships on iOS, Android, and (eventually) desktop.
#
# Network:
# - `http` â€” the standard cross-platform HTTP client. Used to call the
#   Anthropic Claude API for the AI chat / load-development assistant
#   features.
#
# UI:
# - `cupertino_icons` â€” Apple-style iOS glyphs. Required by Flutter's
#   `CupertinoIcons` set.
# - `font_awesome_flutter` â€” Font Awesome icon set. Used wherever the
#   Material / Cupertino sets don't have what we need (firearms, calibers,
#   reloading-specific glyphs).
#
# -----------------------------------------------------------------------------
# After editing this file
# -----------------------------------------------------------------------------
#
#   flutter pub get        # resolve dependencies and refresh pubspec.lock
#   flutter analyze        # static-analysis sanity check
#
# If you change `dependencies:` or `dev_dependencies:`, both commands must
# pass before the change is considered complete. If you only edit comments
# (like this header) `flutter pub get` is still recommended because it
# normalizes formatting.
# =============================================================================

name: loadout
description: "Ammo reloading tracker and calculator"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.1.0+2

environment:
  sdk: ^3.11.5

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # `flutter_localizations` ships the Cupertino + Material delegates that
  # plumb a non-English `Locale` through Flutter's built-in widgets (Cancel
  # button text, date pickers, default error strings). Required as soon as
  # the app supports any locale beyond English. Pairs with `intl` and the
  # generated `AppLocalizations` class produced by `flutter gen-l10n` from
  # the ARB files in `lib/l10n/`. See the "Internationalization" section in
  # CLAUDE.md for the migration pattern.
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  # SVG path-data parser. Used by `lib/widgets/animal_silhouettes.dart`
  # and `lib/widgets/target_silhouettes.dart` to convert the
  # hand-authored SVG silhouettes under `assets/silhouettes/` into
  # Flutter `Path` objects (per the v2.3 Range Day Realistic rewrite,
  # Appendix H.2). The parser supports the full SVG path spec including
  # cubic Beziers and arcs.
  path_drawing: ^1.0.1
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  # Optional crash reporting. OFF by default. Activated only when the
  # user flips the "Send anonymous crash reports" switch in
  # Settings â†’ Diagnostics, which sets the
  # `crashlytics_enabled` SharedPreferences flag and triggers
  # `Firebase.setCrashlyticsCollectionEnabled(true)` plus the
  # `FlutterError.onError` / `PlatformDispatcher.instance.onError`
  # hooks in `lib/main.dart`. No reloading data, recipes, firearms,
  # or PII is ever sent â€” only stack traces and platform metadata.
  firebase_crashlytics: ^5.2.0  # paired with firebase_core ^4.7.0
  # Pulls reference-catalog updates (cartridges, powders, primers, etc.) from
  # Firebase Storage on launch so the team can ship JSON fixes without an
  # App Store / Play Store release. User reloading data is never uploaded â€”
  # this is one-way, server-to-device, reference-only. See
  # `lib/services/seed_updater.dart` for the read-and-cache flow.
  firebase_storage: ^13.0.0
  provider: ^6.1.5+1
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.0.0
  font_awesome_flutter: ^11.0.0
  app_links: ^7.0.0
  shared_preferences: ^2.5.5
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.1
  purchases_flutter: ^9.4.0
  http: ^1.1.0

  # url_launcher â€” opens external URLs (e.g. SAAMI cartridge spec PDFs from
  # the SAAMI Specs tab) in the platform's browser / PDF viewer.
  url_launcher: ^6.3.0

  # Backup & export (feature #5).
  # share_plus  â€” system share sheet for the local JSON export.
  # cryptography â€” pure-Dart AES-256-GCM + PBKDF2 used to encrypt the
  #                cloud-backup blob entirely on-device.
  # icloud_storage â€” iOS-only iCloud Drive backup target. Falls back to
  #                  unavailable when the iCloud capability isn't enabled
  #                  on the App ID, so dev/CI builds don't break.
  # googleapis / googleapis_auth â€” Drive API client for the cross-platform
  #                                Google Drive (appDataFolder) backup target.
  # flutter_secure_storage â€” iOS Keychain / Android Keystore wrapper used
  #                          by Cloud Sync (feature #6) to cache the
  #                          end-to-end-encryption passphrase across launches
  #                          so AutoSave can sync without re-prompting. Never
  #                          touches SharedPreferences. The passphrase entry
  #                          is keyed per-provider so iCloud, Drive, and
  #                          OneDrive can each have their own.
  share_plus: ^10.1.4
  # `share_handler` is the INBOUND counterpart to share_plus. When the
  # user picks LoadOut in the iOS / Android share sheet (e.g. from
  # Apple Notes, OneNote on iOS, or any text-share-capable app), this
  # plugin delivers the shared content to Dart. Recipe-import flow:
  # share-text â†’ RecipeParser â†’ PhotoImportReviewScreen (the existing
  # review surface). MIT licensed, actively maintained.
  #
  # iOS requires a one-time manual Share Extension target add (similar
  # to the watch-app setup in Â§ 15 of CLAUDE.md) â€” see the
  # `ios/ShareExtension/README.md` (added alongside the plugin) for
  # the Xcode GUI steps. Android works out of the box via the
  # AndroidManifest intent-filter additions in this same change.
  share_handler: ^0.0.25
  cryptography: ^2.7.0
  icloud_storage: ^2.2.0
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  flutter_secure_storage: ^9.2.2

  # Pro feature: pull current weather (temperature / pressure / humidity /
  # wind) from open-meteo.com for the ballistics screen's Environment
  # section. `geolocator` provides the cross-platform location-permission
  # handshake plus a one-shot lat/lon read; the `http` client above is
  # reused for the actual open-meteo REST call. open-meteo requires no
  # API key and no signup, which keeps the privacy footprint minimal â€”
  # only the user's coarse coordinates leave the device.
  geolocator: ^13.0.0

  # Smart Import (feature: convert Excel reloaders, free-tier).
  # `file_picker` exposes the OS file picker so the user can hand us a
  # `.csv` or `.xlsx` from anywhere on the device. Cross-platform on iOS,
  # Android, macOS, Windows. CSV parsing itself is hand-rolled inside
  # `lib/services/spreadsheet_import_service.dart` (RFC-4180 quoting) â€”
  # small enough to avoid pulling in a third-party CSV package.
  # `excel` reads `.xlsx` workbooks (Office Open XML) so reloaders who
  # keep their data in Excel can hand us the workbook directly without
  # exporting to CSV first. Pure-Dart, ships on every platform.
  file_picker: ^8.0.0
  excel: ^4.0.6

  # Photo import (feature: convert pen-and-paper reloaders, free-tier).
  # `image_picker` is Flutter's official wrapper around the platform
  # camera + photo library. iOS + Android only â€” no macOS implementation
  # ships with the package today, so the entry-point UI is gated behind
  # `Platform.isIOS || Platform.isAndroid` and the Photo Import bottom-
  # sheet item is hidden on macOS / Windows.
  # `google_mlkit_text_recognition` is Google's ML Kit on-device OCR.
  # Supports printed + cursive Latin script. The first invocation
  # downloads the model into local app storage (~30MB once, on-device);
  # subsequent calls are fully offline. This keeps the photo-import flow
  # privacy-aligned: the captured photo never leaves the device.
  image_picker: ^1.1.0
  google_mlkit_text_recognition: ^0.15.0

  # Reads the app version + build number at runtime so the Settings
  # footer and Help & Support mailto body don't have to re-hardcode the
  # value listed in `pubspec.yaml` `version:`. Cross-platform.
  package_info_plus: ^8.0.0

  # Device-info introspection. Used by `lib/services/device_compatibility_service.dart`
  # and `lib/screens/settings/device_compatibility_screen.dart` to detect
  # the OS version at runtime so we can hide hardware-linked features
  # (BLE devices, Wear OS pairing, motion sensors) on Android versions
  # too old to support them â€” Pattern C device-compatibility UX, see
  # CLAUDE.md Â§ 9. Read-only on every platform; no permissions, no PII
  # leaves the device. iOS / macOS implementations return
  # `iosInfo.systemVersion` and `macOsInfo.osRelease` respectively.
  device_info_plus: ^11.0.0

  # Bluetooth Low Energy connectivity (Pro feature).
  # `flutter_blue_plus` is the most-maintained Flutter BLE package; it
  # exposes a stream-based API for scanning, connecting, and reading from
  # GATT characteristics. Used by the Kestrel weather-meter integration
  # (live atmospheric data into the ballistics + range-day screens).
  # `permission_handler` is required to request the Android 12+ split
  # `BLUETOOTH_SCAN` and `BLUETOOTH_CONNECT` runtime permissions; on iOS
  # the OS prompts via `NSBluetoothAlwaysUsageDescription` automatically
  # but the package gives us a uniform "open settings" deep-link API.
  flutter_blue_plus: ^1.32.0
  permission_handler: ^11.0.0

  # PDF generation (sample notebook page printable, feature: pen-and-paper
  # conversion). The `pdf` package is pure-Dart and renders directly to a
  # `Uint8List` of PDF bytes â€” no native dependency, no per-platform
  # codepath. We pair it with `share_plus` (already pulled in above for the
  # JSON export feature) to surface the OS share sheet so the user can
  # print, AirDrop, save to Files, etc. This is the only place we use the
  # `pdf` package today; the `RecipePrintService` deliberately uses plain
  # text instead because individual recipes are simple enough that
  # text-via-share-sheet covers every output path. The sample-notebook
  # page needs a tabular layout that doesn't render reliably in plain
  # text across share-receiving apps.
  pdf: ^3.10.0
  # `printing` exposes `Printing.raster(...)` which renders any PDF
  # page-by-page to a `PdfRaster` (PNG-encoded image bytes). Used by
  # the import flow (see `lib/services/text_import_service.dart`):
  # rasterize each page â†’ write to temp PNG â†’ run ML Kit OCR â†’
  # concatenate the recognised text â†’ hand to RecipeParser. The same
  # plugin also provides AirPrint / system-print on platforms where
  # we want to print a recipe card; we use only the rasterise path
  # today. Cross-platform (iOS, Android, macOS, Linux, Windows, web).
  printing: ^5.13.4

  # Live device sensors for the Range Day Setup section.
  # `sensors_plus` exposes the OS accelerometer, gyroscope, and
  # magnetometer event streams behind a uniform Dart API. We use it
  # for two range-day affordances:
  #   1. Tilt / "cant" â€” phone-on-rifle level + cant correction term in
  #      the firing solution (Pro).
  #   2. Magnetometer â€” true-heading auto-fill of the shot azimuth field
  #      (free; sensors are already on the device).
  # iOS and Android expose all three sensors natively; macOS / Linux /
  # Windows / Web do not have a magnetometer (and accelerometer support
  # varies). The wrapper services in `lib/services/sensors/` detect
  # absence of samples and gate the UI gracefully.
  sensors_plus: ^6.0.0

  # Recipe QR sharing (peer-to-peer offline import).
  # `qr_flutter` renders a `Widget` QR code from an arbitrary string. We
  # use it for the in-app "Share via QR" sheet so a second LoadOut user
  # can scan the recipe with their camera â€” no network, no account, no
  # server. The QR encodes a gzip-compressed JSON subset of the recipe
  # (cartridge, powder, charge, bullet, primer, COAL/CBTO, notes), magic-
  # prefixed `LO1:` so the scanner can tell it apart from arbitrary QRs.
  # `mobile_scanner` is the camera side of the same flow â€” modern, MIT-
  # licensed, MLKit-backed on Android and AVFoundation on iOS. It opens
  # a camera preview, detects barcodes in the visible frame, and emits
  # the decoded payload. Camera permission is handled via the existing
  # `permission_handler` and the iOS `NSCameraUsageDescription` already
  # declared for the photo-import feature. We pin to ^7.2.0 because that
  # series tracks the same `GoogleMLKit/MLKitCore 9.0.0` floor that
  # `google_mlkit_text_recognition: ^0.15.0` already pulls in â€” earlier
  # mobile_scanner releases pinned MLKit 6.x and produced a CocoaPods
  # version conflict.
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # Local biometric authentication (Face ID / Touch ID on iOS,
  # fingerprint on Android, Windows Hello on desktop). Used purely
  # as a local "unlock the app" gate on top of Firebase Auth's
  # cached credentials â€” biometric never sees the user's password
  # or any account material. See lib/services/biometric_service.dart.
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  drift_dev: ^2.33.0
  build_runner: ^2.15.0
  flutter_launcher_icons: ^0.14.4
  image: ^4.3.0

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#1F2937"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 21

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Tells the Flutter build to run the gen-l10n code generator, which
  # reads `l10n.yaml` at the project root, parses every ARB file in
  # `lib/l10n/`, and emits `AppLocalizations` (+ per-locale subclasses)
  # under `.dart_tool/flutter_gen/gen_l10n/`. The generated code is
  # picked up automatically â€” no `dart run build_runner` step needed.
  # See CLAUDE.md â†’ Internationalization for the migration pattern.
  generate: true

  assets:
    # Flutter asset declarations do NOT recurse into subdirectories â€” a bare
    # `assets/seed_data/` entry only picks up files directly inside that
    # folder, NOT files inside `assets/seed_data/drag_curves/`. Each
    # subdirectory of seed_data must be listed on its own line. The Hornady
    # 4DOF / Berger / Sierra measured Cd-vs-Mach curves live in drag_curves/
    # and are loaded at startup by `SeedLoader._seedDragCurves`; without the
    # subdir entry below, the app crashes on first launch with "Unable to
    # load asset: assets/seed_data/drag_curves/curves.json". Add a new line
    # whenever a new seed_data subdirectory is created.
    - assets/seed_data/
    - assets/seed_data/drag_curves/
    - assets/seed_data/components/
    # v2.3 Range Day Realistic rewrite: 16 hand-authored animal SVG
    # silhouettes (deer / elk / bear / boar / etc.) rendered via
    # `path_drawing` from `lib/widgets/animal_silhouettes.dart`. Parallel
    # `targets/` dir ships competition-target SVGs (pepper popper today,
    # IDPA / USPSA / NRA targets next per `docs/ROADMAP.md`). Note: the
    # old `reticle_subtensions/` line was removed when the merge in
    # Phase 2.4 consolidated those files into `reticles.json`.
    - assets/silhouettes/animals/
    - assets/silhouettes/targets/

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
